# Demonstrates exporting batch output to a single file and compressing it as a zip.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-MODULE=zip-export/uris.xqy|ADHOC
PROCESS-MODULE=zip-export/process.xqy|ADHOC

#You can explicitly specify the task classes to use, but if export options are specified, the ExportBatchToFileTask and PostBatchUpdateFileTask will be used by default.
#PROCESS-TASK=com.marklogic.developer.corb.ExportBatchToFileTask
#POST-BATCH-TASK=com.marklogic.developer.corb.PostBatchUpdateFileTask

EXPORT-FILE-NAME=build/zip-export.txt
EXPORT-FILE-AS-ZIP=true

THREAD-COUNT=4
