# Demonstrates processing multiple URIs per invocation with a custom delimiter.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-MODULE=batch-size-delimited/uris.xqy|ADHOC
PROCESS-MODULE=batch-size-delimited/process.xqy|ADHOC

BATCH-SIZE=3
BATCH-URI-DELIM=|

EXPORT-FILE-NAME=build/batch-size-delimited.txt

THREAD-COUNT=4
