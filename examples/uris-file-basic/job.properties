# Demonstrates using URIS-FILE to drive processing from a client-side text file.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-FILE=uris-file-basic/uris.txt
PROCESS-MODULE=uris-file-basic/process.xqy|ADHOC

EXPORT-FILE-NAME=build/uris-file-basic.txt

THREAD-COUNT=4
