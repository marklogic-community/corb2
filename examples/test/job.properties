# The FileUrisDirectoryLoader will recurse through the configured directory and send the files (and metadata about the files)
# in a serialized XML doc. See the process.xqy for an example of the content for the $URI
#URIS-LOADER=com.marklogic.developer.corb.FileUrisDirectoryLoader
# update with an appropriate path to the directory containing the json docs.
# Can be relative from where the CoRB job is executed from, or a full path
#LOADER-PATH=data/new-keywords

# If the json docs were in a zip file, you could use the FileUrisZipLoader and point it to the zip file
#URIS-LOADER=com.marklogic.developer.corb.FileUrisZipLoader
#LOADER-PATH=data/new-keywords.zip

# base64 encode the JSON, so we don't have to worry about character encoding and escaping of JSON inside of XML serialized to a string when we marshal it back
#LOADER-BASE64-ENCODE=true

# this module will be executed for each json doc discovered
#PROCESS-MODULE=test/process.xqy|ADHOC

# If you want to write a report of what is processed, configure a relative or absolute file path indicating
# where to write the output returned from the PROCESS-MODULE. Currently, it returns the URI of the Article that was updated with keywords
#EXPORT-FILE-NAME=test/report.txt
# you can also specify EXPORT-FILE-DIR with the base dir
# specifying EXPORT-FILE-NAME will automatically configure PROCESS-TASK=com.marklogic.developer.corb.ExportBatchToFileTask for you

#THREAD-COUNT=10
# A properties file for CoRB to watch for changes, and update either the THREAD-COUNT changes or COMMAND=pause|resume|stop
#COMMAND-FILE=test/job.properties


#COMMAND=pause

# probably less important to have DISK-QUEUE enabled for this file ingest, but if you are going to run CoRB and select many URIs,
# then enabling this option allows CoRB to spill to disk and manage the URIs queue, rather than having to hold it all in memory while running.
#DISK-QUEUE=true
# Override the TEMP-DIR location with a different path to be used for the DISK-QUEUE
#DISK-QUEUE-TEMP-DIR=

# Decide whether or not you want the job to fail and stop if there is an error processing any of the URIs
#FAIL-ON-ERROR=false

#Provide a range of ports to try to obtain and use for the Job UI and metrics service
#JOB-SERVER-PORT=8000-9000


#PROCESS-TASK=com.marklogic.developer.corb.ExportBatchToFileTask
#EXPORT-FILE-NAME=test/testOutput.txt

#PROCESS-TASK=com.marklogic.developer.corb.ExportToFileTask

#POST-BATCH-TASK=com.marklogic.developer.corb.PostBatchUpdateFileTask
#EXPORT-FILE-SORT=descending

THREAD-COUNT=10
URIS-MODULE=INLINE-XQUERY|let $uris := 1 to 2000000 return (count($uris), $uris)
BATCH-SIZE=100
#PROCESS-MODULE=test/process.sjs|ADHOC
PROCESS-MODULE=test/process.xqy|ADHOC
