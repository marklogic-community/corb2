# Demonstrates selecting JSON objects from a client-side JSON file with FileUrisJSONLoader.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-LOADER=com.marklogic.developer.corb.FileUrisJSONLoader
JSON-FILE=loader-json/input/sample.json
JSON-NODE=/items/*
JSON-METADATA=/metadata

# When envelope mode is disabled, each selected JSON value is passed to the
# process module as raw JSON text in $URI.
LOADER-USE-ENVELOPE=false

PROCESS-MODULE=INLINE-XQUERY|declare variable $URI as xs:string external; $URI

EXPORT-FILE-NAME=build/loader-json.jsonl

THREAD-COUNT=4
