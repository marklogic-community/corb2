# Demonstrates selecting JSON values from a client-side JSON file with FileUrisStreamingJSONLoader.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-LOADER=com.marklogic.developer.corb.FileUrisStreamingJSONLoader
JSON-FILE=loader-json-streaming/input/array-root.json

# For a root JSON array, /* selects each object in the array.
# Using /*/* would instead select each child value inside those objects.
JSON-NODE=/*

LOADER-USE-ENVELOPE=false

PROCESS-MODULE=INLINE-XQUERY|declare variable $URI as xs:string external; $URI

EXPORT-FILE-NAME=build/loader-json-streaming.jsonl

THREAD-COUNT=4
