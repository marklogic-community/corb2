# Demonstrates reading files from a ZIP archive via FileUrisZipLoader.
#
# Provide the XCC connection details externally when running the job; this file
# focuses on the options relevant to the feature being demonstrated.

URIS-LOADER=com.marklogic.developer.corb.FileUrisZipLoader
ZIP-FILE=loader-zip/input/sample.zip

PROCESS-MODULE=loader-zip/process.xqy|ADHOC

EXPORT-FILE-NAME=build/loader-zip-report.csv
EXPORT-FILE-TOP-CONTENT=path,contentType,base64Length

THREAD-COUNT=4
